services:

  # Clones the ttrpg engine repo into ./ttrpg on first start.
  # On subsequent starts it's a no-op (already cloned).
  ttrpg-init:
    image: alpine/git
    volumes:
      - ./ttrpg:/mnt/ttrpg
    command: >
      sh -c "
        [ -d /mnt/ttrpg/.git ] || git clone https://github.com/phieb/ttrpg.git /mnt/ttrpg &&
        [ -f /mnt/ttrpg/status.yaml ] || cp /mnt/ttrpg/status.example.yaml /mnt/ttrpg/status.yaml
      "

  ttrpg-bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - TTRPG_PATH=/mnt/ttrpg
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcp-sa.json
    depends_on:
      ttrpg-init:
        condition: service_completed_successfully
      signal-cli:
        condition: service_started
    volumes:
      - ./ttrpg:/mnt/ttrpg
      # !! Set this to the path of your GCP service account key file !!
      - ./gcp-sa.json:/app/gcp-sa.json:ro

      # ── Addons ───────────────────────────────────────────────────────────────
      # Mount flavour folders from addon repos into the engine.
      # Each flavour gets its own line. Clone the addon repo first, then uncomment.
      #
      # Example — ttrpg-flavour-horror (horror flavour):
      # - /path/to/ttrpg-flavour-horror/flavours/horror:/mnt/ttrpg/_engine/flavours/horror

  signal-cli:
    image: bbernhard/signal-cli-rest-api:latest
    restart: unless-stopped
    environment:
      - MODE=native
    ports:
      - "8085:8080"
    volumes:
      - ./signal-cli:/home/.local/share/signal-cli
